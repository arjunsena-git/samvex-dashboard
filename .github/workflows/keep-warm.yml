name: Keep Cache Warm

# Render Starter plan is always-on — no spin-down to prevent.
# This cron now only exists to keep the daily Yahoo batch cache hot
# so the first screener request of each session is fast.
# Runs every 30 min during IST market hours, Mon-Fri.
# UTC: IST 9:00 AM-3:30 PM = UTC 3:30-10:00
on:
  schedule:
    - cron: "30 3-9 * * 1-5"   # every 30 min, 3:30-9:30 UTC (9:00 AM-3:00 PM IST)
    - cron: "0 10 * * 1-5"     # final warm at 3:30 PM IST
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Warm market data cache
        run: |
          curl -s --max-time 45 https://samvex-api.onrender.com/api/market > /dev/null
          echo "Market data cache warmed"
