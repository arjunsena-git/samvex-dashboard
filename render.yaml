services:
  - type: web
    name: samvex-api
    env: python
    region: singapore        # closest to India / IST timezone
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --timeout 120 --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
